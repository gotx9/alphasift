# 缩量回踩选股策略
name: shrink_pullback
display_name: 缩量回踩
description: 上升趋势中缩量回踩均线支撑，趋势延续的入场机会
category: trend

screening:
  enabled: false
  market_scope: [cn]
  hard_filters:
    exclude_st: true
    amount_min: 80000000
    turnover_rate_min: 1.0
    require_ma_bullish: true
    require_price_above_ma20: true
    signal_score_min: 65
  tech_weight: 0.5
  ranking_hints: |
    在满足缩量回踩特征的候选中，优先关注：
    1. 回调幅度适中、趋势结构未破坏
    2. 缩量明显，洗盘而非出货
    3. 近期无重大利空
  max_output: 5
