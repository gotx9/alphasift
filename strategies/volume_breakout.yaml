# 放量突破选股策略
name: volume_breakout
display_name: 放量突破
description: 成交量放大突破关键阻力位，趋势启动信号
category: trend

screening:
  enabled: true
  market_scope: [cn]
  hard_filters:
    exclude_st: true
    amount_min: 100000000
    turnover_rate_min: 3.0
    volume_ratio_min: 2.0
    change_pct_min: 2.0
    change_pct_max: 9.9
  tech_weight: 0.6
  ranking_hints: |
    优先关注：
    1. 突破前有明显横盘整理（至少 10 个交易日）
    2. 突破当日成交量为近 20 日均量的 2 倍以上
    3. 突破后股价站上所有短期均线
    4. 板块有联动效应更佳
  max_output: 5
